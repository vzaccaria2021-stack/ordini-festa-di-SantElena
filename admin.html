<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Ordini Festa Sant'Elena</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="max-w-6xl mx-auto p-6">

    <!-- Contatori -->
    <div class="bg-white rounded-3xl shadow p-8 mb-8">
      <div class="grid grid-cols-3 gap-8 text-center">
        <div>
          <p class="text-xl text-gray-500">Totali</p>
          <p id="totale-ordini" class="text-6xl font-bold text-amber-800">0</p>
        </div>
        <div>
          <p class="text-xl text-gray-500">Da ritirare</p>
          <p id="da-ritirare" class="text-6xl font-bold text-blue-600">0</p>
        </div>
        <div>
          <p class="text-xl text-gray-500">Consegnati</p>
          <p id="ritirati" class="text-6xl font-bold text-green-600">0</p>
        </div>
      </div>
    </div>

    <!-- Ricerca -->
    <div class="mb-8">
      <div class="relative">
        <input type="text" id="search-input" 
               class="w-full p-6 pl-16 text-2xl rounded-3xl border border-gray-300 focus:border-amber-500 outline-none"
               placeholder="Cerca per numero o nome cliente...">
        <i class="fas fa-search absolute left-7 top-7 text-gray-400 text-3xl"></i>
      </div>
    </div>

    <div class="bg-white rounded-3xl shadow p-8">
      <h2 class="text-4xl font-bold mb-10">Lista Ordini Registrati</h2>
      <div id="lista-ordini" class="space-y-8"></div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCDX2e05Z2LGbm3I1bUVpXG7wu4WgKbA78",
      authDomain: "festa-sant-elena.firebaseapp.com",
      databaseURL: "https://festa-sant-elena-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "festa-sant-elena",
      storageBucket: "festa-sant-elena.firebasestorage.app",
      messagingSenderId: "350486542022",
      appId: "1:350486542022:web:b56a29e34ae8f6f6ec49c7"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function caricaOrdini() {
      db.ref('ordini').on('value', (snapshot) => {
        let ordini = [];
        snapshot.forEach(child => ordini.push(child.val()));

        const totali = ordini.length;
        const consegnati = ordini.filter(o => o.consegnato).length;
        const daConsegnare = totali - consegnati;

        document.getElementById('totale-ordini').textContent = totali;
        document.getElementById('da-ritirare').textContent = daConsegnare;
        document.getElementById('ritirati').textContent = consegnati;

        const container = document.getElementById('lista-ordini');
        container.innerHTML = '';

        if (totali === 0) {
          container.innerHTML = `<p class="text-center text-gray-500 py-24 text-4xl">Nessun ordine registrato</p>`;
          return;
        }

        // Ordina dal più recente
        ordini.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

        ordini.forEach((ordine, index) => {
          const isConsegnato = ordine.consegnato || false;
          
          let itemsHtml = ordine.items.map(item => {
            const text = typeof item === 'string' ? item : '';
            const isConsegnata = text.includes('(Consegnata)');
            return isConsegnata 
              ? `<span class="line-through text-gray-500">${text}</span>` 
              : `<span>${text}</span>`;
          }).join('<br>');

          const orarioConsegna = ordine.orarioConsegna 
            ? `<p class="text-green-600 mt-3 text-xl">📍 Consegnato alle ${ordine.orarioConsegna}</p>` 
            : '';

          const html = `
            <div class="border ${isConsegnato ? 'border-green-400 bg-green-50' : 'border-gray-200'} rounded-3xl p-8">
              <div class="flex justify-between mb-6">
                <div>
                  <span class="text-5xl font-bold text-amber-800">#${ordine.numero ? ordine.numero.toString().slice(-4) : ''}</span>
                  <span class="ml-4 text-gray-500">${ordine.data || ''}</span>
                </div>
                <div class="text-5xl font-bold text-green-600">${ordine.totale ? ordine.totale.toFixed(2) : '0.00'} €</div>
              </div>
              <p class="text-3xl font-bold mb-4">${ordine.cliente}</p>
              <div class="text-xl mb-4">${itemsHtml}</div>
              ${orarioConsegna}

              <button onclick="segnaComeConsegnato('${ordine.timestamp}')" 
                      class="w-full py-6 text-2xl font-bold rounded-3xl ${isConsegnato ? 
                        'bg-gray-300 text-gray-600 cursor-not-allowed' : 
                        'bg-green-600 hover:bg-green-700 text-white'}"
                      ${isConsegnato ? 'disabled' : ''}>
                ${isConsegnato ? '✓ Consegnato' : '✅ Segna come Consegnato'}
              </button>
            </div>`;
          container.innerHTML += html;
        });
      });
    }

    function segnaComeConsegnato(timestamp) {
      db.ref('ordini').orderByChild('timestamp').equalTo(Number(timestamp)).limitToFirst(1).once('value', snapshot => {
        snapshot.forEach(child => {
          child.ref.update({
            consegnato: true,
            orarioConsegna: new Date().toLocaleTimeString('it-IT', {hour: '2-digit', minute: '2-digit'})
          });
        });
      });
    }

    // Avvio
    caricaOrdini();
  </script>
</body>
</html>
