<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Ordini Festa Parrocchiale</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="max-w-6xl mx-auto p-6">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-4xl font-bold text-amber-900">📊 Admin Ordini</h1>
      <button onclick="cancellaTuttiOrdini()" 
              class="bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-2xl font-medium">
        🗑️ Cancella Tutti gli Ordini
      </button>
    </div>

    <div class="bg-white rounded-3xl shadow p-6">
      <h2 class="text-2xl font-bold mb-6 flex items-center gap-3">
        <i class="fas fa-list"></i> Lista Ordini Registrati
      </h2>
      
      <div id="lista-ordini" class="space-y-4"></div>
    </div>
  </div>

  <script>
    function caricaOrdini() {
      let ordini = JSON.parse(localStorage.getItem('ordiniFesta') || '[]');
      const container = document.getElementById('lista-ordini');
      
      if (ordini.length === 0) {
        container.innerHTML = `<p class="text-center text-gray-500 py-12 text-xl">Nessun ordine registrato ancora</p>`;
        return;
      }

      let html = '';
      ordini.forEach(ordine => {
        html += `
          <div class="border border-gray-200 rounded-2xl p-5 hover:shadow-md transition">
            <div class="flex justify-between items-start">
              <div>
                <span class="text-3xl font-bold text-amber-800">#${ordine.numero.toString().padStart(3, '0')}</span>
                <span class="text-gray-500 ml-3">${ordine.data}</span>
              </div>
              <div class="text-right">
                <span class="text-2xl font-bold text-green-600">${ordine.totale.toFixed(2)} €</span>
              </div>
            </div>
            
            <div class="mt-3">
              <p class="font-semibold text-lg">${ordine.cliente}</p>
              <p class="text-gray-600 mt-1">${ordine.items.join(' • ')}</p>
            </div>
          </div>`;
      });
      
      container.innerHTML = html;
    }

    function cancellaTuttiOrdini() {
      if (confirm("⚠️ Vuoi davvero cancellare TUTTI gli ordini? Questa azione non si può annullare.")) {
        localStorage.removeItem('ordiniFesta');
        caricaOrdini();
        alert("Tutti gli ordini sono stati cancellati.");
      }
    }

    // Ricarica gli ordini ogni 5 secondi (utile se usi più dispositivi)
    setInterval(caricaOrdini, 5000);
    caricaOrdini();
  </script>
</body>
</html>
