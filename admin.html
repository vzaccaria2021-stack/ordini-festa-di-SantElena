<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Ordini Festa Sant'Elena</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="max-w-6xl mx-auto p-6">

    <!-- Contatori grandi -->
    <div class="bg-white rounded-3xl shadow p-8 mb-8">
      <div class="grid grid-cols-3 gap-8 text-center">
        <div>
          <p class="text-lg text-gray-500">Totali</p>
          <p id="totale-ordini" class="text-5xl font-bold text-amber-800">0</p>
        </div>
        <div>
          <p class="text-lg text-gray-500">Da ritirare</p>
          <p id="da-ritirare" class="text-5xl font-bold text-blue-600">0</p>
        </div>
        <div>
          <p class="text-lg text-gray-500">Ritirati</p>
          <p id="ritirati" class="text-5xl font-bold text-green-600">0</p>
        </div>
      </div>
    </div>

    <!-- Ricerca + Reset -->
    <div class="flex gap-4 mb-8">
      <div class="flex-1 relative">
        <input type="text" id="search-input" 
               class="w-full p-5 pl-14 text-lg rounded-3xl border border-gray-300 focus:border-amber-500 outline-none"
               placeholder="Cerca per numero ticket o nome cliente...">
        <i class="fas fa-search absolute left-6 top-6 text-gray-400 text-xl"></i>
      </div>
      <button onclick="resettaTuttiOrdini()" 
              class="bg-red-600 hover:bg-red-700 text-white px-10 py-5 rounded-3xl font-medium text-lg flex items-center gap-3">
        <i class="fas fa-trash"></i> Reset Tutti
      </button>
    </div>

    <div class="bg-white rounded-3xl shadow p-6">
      <h2 class="text-3xl font-bold mb-8">Lista Ordini</h2>
      <div id="lista-ordini" class="space-y-6"></div>
    </div>
  </div>

  <script>
    function caricaOrdini(filtro = '') {
      let ordini = JSON.parse(localStorage.getItem('ordiniFesta') || '[]');
      
      const totali = ordini.length;
      const ritirati = ordini.filter(o => o.ritirato).length;
      const daRitirare = totali - ritirati;

      document.getElementById('totale-ordini').textContent = totali;
      document.getElementById('da-ritirare').textContent = daRitirare;
      document.getElementById('ritirati').textContent = ritirati;

      const container = document.getElementById('lista-ordini');
      if (totali === 0) {
        container.innerHTML = `<p class="text-center text-gray-500 py-20 text-2xl">Nessun ordine registrato</p>`;
        return;
      }

      let html = '';
      const filtered = ordini.filter(ordine => 
        ordine.numero.toString().includes(filtro) || 
        ordine.cliente.toLowerCase().includes(filtro.toLowerCase())
      );

      filtered.forEach((ordine, index) => {
        const isRitirato = ordine.ritirato || false;
        
        let itemsHtml = ordine.items.map(item => {
          // Se contiene "Consegnata" lo barramo
          if (typeof item === 'string' && item.toLowerCase().includes('consegnata')) {
            return `<span class="line-through text-gray-500">${item}</span>`;
          }
          return `<span>${item}</span>`;
        }).join('<br>');

        html += `
          <div class="border ${isRitirato ? 'border-green-400 bg-green-50' : 'border-gray-200'} rounded-3xl p-7 text-lg">
            <div class="flex justify-between items-start mb-4">
              <div>
                <span class="text-4xl font-bold text-amber-800">#${ordine.numero.toString().padStart(3, '0')}</span>
                <span class="text-gray-500 ml-4">${ordine.data}</span>
              </div>
              <div class="text-right">
                <span class="text-3xl font-bold text-green-600">${ordine.totale.toFixed(2)} €</span>
              </div>
            </div>
            
            <div class="mb-5">
              <p class="font-semibold text-2xl mb-2">${ordine.cliente}</p>
              <div class="text-gray-700">${itemsHtml}</div>
            </div>

            <button onclick="toggleRitirato(${index})" 
                    class="w-full py-5 text-xl font-bold rounded-3xl ${isRitirato ? 
                      'bg-gray-300 text-gray-600 cursor-not-allowed' : 
                      'bg-green-600 hover:bg-green-700 text-white'}"
                    ${isRitirato ? 'disabled' : ''}>
              ${isRitirato ? '✓ Consegnato' : '✅ Segna come Consegnato'}
            </button>
          </div>`;
      });
      
      container.innerHTML = html || `<p class="text-center text-gray-500 py-12 text-xl">Nessun ordine trovato</p>`;
    }

    function toggleRitirato(globalIndex) {
      let ordini = JSON.parse(localStorage.getItem('ordiniFesta') || '[]');
      if (ordini[globalIndex].ritirato) return; // Non permette di annullare

      ordini[globalIndex].ritirato = true;
      ordini[globalIndex].orarioConsegna = new Date().toLocaleTimeString('it-IT', {hour: '2-digit', minute: '2-digit'});
      
      localStorage.setItem('ordiniFesta', JSON.stringify(ordini));
      caricaOrdini(document.getElementById('search-input').value);
    }

    function resettaTuttiOrdini() {
      if (confirm("⚠️ Vuoi cancellare TUTTI gli ordini?") &&
          confirm("❗ CONFERMA 2/3: Questa azione è irreversibile!") &&
          confirm("❗ CONFERMA FINALE: Premi OK per cancellare tutto.")) {
        localStorage.removeItem('ordiniFesta');
        caricaOrdini();
      }
    }

    // Ricerca live + aggiornamento automatico
    document.getElementById('search-input').addEventListener('input', (e) => {
      caricaOrdini(e.target.value);
    });

    setInterval(() => caricaOrdini(document.getElementById('search-input').value), 5000);
    caricaOrdini();
  </script>
</body>
</html>
