<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Ordini</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body class="p-8">
  <h1 class="text-3xl font-bold mb-8">Test Firebase</h1>
  
  <button onclick="testSalva()" 
          class="bg-green-600 text-white px-8 py-4 rounded-2xl text-xl">
    TEST: Salva Ordine
  </button>

  <div id="status" class="mt-8 text-lg"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCDX2e05Z2LGbm3I1bUVpXG7wu4WgKbA78",
      authDomain: "festa-sant-elena.firebaseapp.com",
      databaseURL: "https://festa-sant-elena-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "festa-sant-elena",
      storageBucket: "festa-sant-elena.firebasestorage.app",
      messagingSenderId: "350486542022",
      appId: "1:350486542022:web:b56a29e34ae8f6f6ec49c7"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function testSalva() {
      const testOrdine = {
        numero: Date.now(),
        cliente: "Test Utente",
        totale: 15.5,
        data: new Date().toLocaleString('it-IT'),
        timestamp: Date.now()
      };

      db.ref('ordini').push(testOrdine)
        .then(() => {
          document.getElementById('status').innerHTML = 
            `<span class="text-green-600">✅ Ordine salvato correttamente!</span>`;
        })
        .catch(err => {
          document.getElementById('status').innerHTML = 
            `<span class="text-red-600">❌ Errore: ${err.message}</span>`;
          console.error(err);
        });
    }
  </script>
</body>
</html>
