<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Ordini Festa Sant'Elena</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="max-w-6xl mx-auto p-6">

    <div class="bg-white rounded-3xl shadow p-8 mb-8">
      <div class="grid grid-cols-3 gap-8 text-center">
        <div>
          <p class="text-xl text-gray-500">Totali</p>
          <p id="totale-ordini" class="text-6xl font-bold text-amber-800">0</p>
        </div>
        <div>
          <p class="text-xl text-gray-500">Da ritirare</p>
          <p id="da-ritirare" class="text-6xl font-bold text-blue-600">0</p>
        </div>
        <div>
          <p class="text-xl text-gray-500">Ritirati</p>
          <p id="ritirati" class="text-6xl font-bold text-green-600">0</p>
        </div>
      </div>
    </div>

    <div class="mb-8">
      <input type="text" id="search-input" 
             class="w-full p-6 pl-16 text-2xl rounded-3xl border border-gray-300 focus:border-amber-500 outline-none"
             placeholder="Cerca per numero o nome cliente...">
    </div>

    <div class="bg-white rounded-3xl shadow p-8">
      <h2 class="text-4xl font-bold mb-10">Lista Ordini Registrati</h2>
      <div id="lista-ordini" class="space-y-8"></div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCDX2e05Z2LGbm3I1bUVpXG7wu4WgKbA78",
      authDomain: "festa-sant-elena.firebaseapp.com",
      databaseURL: "https://festa-sant-elena-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "festa-sant-elena",
      storageBucket: "festa-sant-elena.firebasestorage.app",
      messagingSenderId: "350486542022",
      appId: "1:350486542022:web:b56a29e34ae8f6f6ec49c7"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function caricaOrdini() {
      db.ref('ordini').on('value', (snapshot) => {
        const ordini = [];
        snapshot.forEach((child) => {
          ordini.push(child.val());
        });

        // Aggiorna contatori
        document.getElementById('totale-ordini').textContent = ordini.length;
        document.getElementById('da-ritirare').textContent = ordini.length;
        document.getElementById('ritirati').textContent = 0;

        const container = document.getElementById('lista-ordini');
        container.innerHTML = '';

        if (ordini.length === 0) {
          container.innerHTML = `<p class="text-center text-gray-500 py-20 text-4xl">Nessun ordine registrato</p>`;
          return;
        }

        // Ordina dal più recente al più vecchio
        ordini.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

        ordini.forEach((ordine) => {
          const itemsHtml = ordine.items.map(item => {
            if (typeof item === 'string' && item.includes('Consegnata')) {
              return `<span class="line-through text-gray-500">${item}</span>`;
            }
            return `<span>${item}</span>`;
          }).join('<br>');

          const html = `
            <div class="border border-gray-200 rounded-3xl p-8">
              <div class="flex justify-between mb-6">
                <div>
                  <span class="text-5xl font-bold text-amber-800">#${ordine.numero ? ordine.numero.toString().slice(-4) : '---'}</span>
                  <span class="ml-4 text-gray-500">${ordine.data || ''}</span>
                </div>
                <div class="text-5xl font-bold text-green-600">${ordine.totale ? ordine.totale.toFixed(2) : '0.00'} €</div>
              </div>
              <p class="text-3xl font-bold mb-4">${ordine.cliente}</p>
              <div class="text-xl text-gray-700">${itemsHtml}</div>
            </div>`;
          
          container.innerHTML += html;
        });
      });
    }

    // Avvio
    caricaOrdini();
  </script>
</body>
</html>
