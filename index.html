<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ordini - Festa Sant'Elena</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-orange-50">
  <div class="max-w-7xl mx-auto p-4">
    <div class="flex justify-between items-center mb-6">
      <div>
        <h1 class="text-4xl font-bold text-amber-900">🎉 Festa di Sant'Elena</h1>
        <p class="text-amber-700">Menu del 09-06-2026</p>
      </div>
      
      <!-- Totale Serata + Pulsante Report -->
      <div class="flex items-center gap-4">
        <div class="bg-white rounded-3xl shadow px-8 py-4 text-center">
          <p class="text-sm text-gray-500">Totale Serata</p>
          <p id="totale-serata" class="text-4xl font-bold text-green-600">0.00 €</p>
        </div>
        <button onclick="generaReport()" 
                class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-4 rounded-3xl font-medium flex items-center gap-2 shadow-lg">
          <i class="fas fa-chart-bar"></i> 
          📊 Report Serata
        </button>
      </div>
    </div>

    <div class="grid grid-cols-12 gap-6">

      <!-- COLONNA SINISTRA: Giacenza -->
      <div class="col-span-3 bg-white rounded-3xl shadow p-5">
        <h2 class="text-xl font-bold mb-4 text-amber-800">📦 Giacenza Magazzino</h2>
        <div id="giacenza" class="space-y-3 text-sm"></div>
      </div>

      <!-- CENTRO: Menu -->
      <div class="col-span-6">
        <div class="mb-6">
          <input type="text" id="nome-cliente" class="w-full p-4 rounded-2xl border-2 border-amber-300 text-lg" placeholder="Nome cliente o tavolo">
        </div>
        <div id="menu-grid" class="grid grid-cols-2 gap-4"></div>
      </div>

      <!-- COLONNA DESTRA -->
      <div class="col-span-3 space-y-6">
        <div class="bg-white rounded-3xl shadow p-5">
          <h3 class="font-bold mb-4">🛒 Ordine Corrente</h3>
          <div id="ordine-corrente" class="min-h-[180px] text-sm"></div>

          <div class="mt-6 space-y-3">
            <div>
              <label class="block text-sm text-gray-600 mb-1">Importo Consegnato (€)</label>
              <input type="number" id="importo-consegnato" step="0.5" value="0" 
                     class="w-full p-3 rounded-2xl border-2 border-green-300 text-2xl text-center font-bold"
                     oninput="calcolaResto()">
            </div>
            <div class="flex justify-between text-lg font-bold">
              <span>Totale Ordine:</span>
              <span id="totale-ordine" class="text-green-600">0.00 €</span>
            </div>
            <div class="flex justify-between text-lg font-bold text-red-600">
              <span>Resto da dare:</span>
              <span id="resto">0.00 €</span>
            </div>
          </div>

          <button onclick="confermaOrdine()" 
                  class="w-full mt-6 bg-green-600 hover:bg-green-700 text-white py-5 rounded-3xl text-xl font-bold">
            ✅ CONFERMA ORDINE
          </button>
        </div>

        <div class="bg-white rounded-3xl shadow p-5">
          <h3 class="font-bold mb-4">📋 Cronologia Ordini</h3>
          <div id="cronologia" class="max-h-[380px] overflow-auto space-y-3 text-sm"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Report -->
  <div id="modal-report" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl max-w-2xl w-full mx-4 max-h-[90vh] overflow-auto">
      <div class="p-6 border-b">
        <h2 class="text-3xl font-bold text-amber-900">📊 Report della Serata</h2>
        <p id="report-data" class="text-gray-500"></p>
      </div>
      <div class="p-6" id="contenuto-report"></div>
      <div class="p-6 border-t flex gap-3">
        <button onclick="chiudiReport()" class="flex-1 py-4 bg-gray-200 hover:bg-gray-300 rounded-2xl font-medium">Chiudi</button>
        <button onclick="stampaReport()" class="flex-1 py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-medium">🖨️ Stampa Report</button>
      </div>
    </div>
  </div>

  <script>
    // ... (tutto il codice precedente rimane uguale fino a caricaTutto())

    let giacenza = { /* stesso di prima */ 
      "Arancini": 50, "Olive Ascolane": 40, "Patatine Fritte": 60, "Hot Dog": 30, "Panino Salame": 35,
      "Acqua Naturale": 80, "Acqua Frizzante": 70, "Coca Cola": 60, "Aranciata": 50, "Birra": 40,
      "Gelato Cioccolato": 45, "Gelato Nocciola": 45, "Gelato Fragola": 45, "Coppa Mista": 30, "Torta della Nonna": 25
    };

    // ... (mantieni tutto il codice delle funzioni precedenti: caricaGiacenza, caricaMenu, cambiaQuantita, aggiornaOrdineCorrente, calcolaResto, confermaOrdine, caricaCronologia ...)

    function aggiornaTotaleSerata() {
      let ordini = JSON.parse(localStorage.getItem('ordiniFesta') || '[]');
      const totaleSerata = ordini.reduce((sum, o) => sum + (o.totale || 0), 0);
      document.getElementById('totale-serata').textContent = totaleSerata.toFixed(2) + " €";
    }

    function generaReport() {
      let ordini = JSON.parse(localStorage.getItem('ordiniFesta') || '[]');
      const totaleSerata = ordini.reduce((sum, o) => sum + (o.totale || 0), 0);
      const ora = new Date().toLocaleString('it-IT');

      let html = `
        <p class="text-lg mb-6"><strong>Numero Ordini:</strong> ${ordini.length}</p>
        <p class="text-3xl font-bold text-green-600 mb-6">Totale Incassato: ${totaleSerata.toFixed(2)} €</p>
        <h3 class="font-bold mb-3">Dettaglio Ordini:</h3>
      `;

      ordini.slice().reverse().forEach(o => {
        html += `
          <div class="border-b py-3">
            <strong>#${o.numero.toString().padStart(3,'0')}</strong> - ${o.cliente}<br>
            <span class="text-green-600">${o.totale.toFixed(2)} €</span> - ${o.orario || ''}
          </div>`;
      });

      document.getElementById('report-data').textContent = `Generato il ${ora}`;
      document.getElementById('contenuto-report').innerHTML = html;
      document.getElementById('modal-report').classList.remove('hidden');
    }

    function chiudiReport() {
      document.getElementById('modal-report').classList.add('hidden');
    }

    function stampaReport() {
      window.print();
    }

    // Avvio
    caricaTutto();
  </script>
</body>
</html>
